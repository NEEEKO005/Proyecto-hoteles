site_name: Hotel Manager
site_description: Sistema de administración de habitaciones de hotel
site_url: https://tu-usuario.github.io/hotel-manager
repo_url: https://github.com/NEEEKO005/Proyecto-hoteles/tree/main/docs
repo_name: NEEEKO005/hotel-manager

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Modo oscuro
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

nav:
  - Inicio: index.md
  - Primeros Pasos: getting-started.md
  - Guía de Usuario:
    - Comandos CLI: user-guide/commands.md
    - Persistencia: user-guide/persistence.md
  - Arquitectura: architecture.md
  - Referencia API: reference.md
